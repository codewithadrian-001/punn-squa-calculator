<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punnett Square Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-blue: #00f3ff;
  --neon-glow: 0 0 15px rgba(0, 243, 255, 0.4);
  --glass-bg: rgba(20, 22, 35, 0.4);
  --glass-border: rgba(0, 243, 255, 0.15);
  --ink: #e2e8f0;
  --ink2: #94a3b8;
  --ink3: #64748b;
  --paper: #0b0f19;
  --surface: rgba(255, 255, 255, 0.03);
  --surface2: rgba(255, 255, 255, 0.05);
  --accent: #00f3ff;
  --accent-light: rgba(0, 243, 255, 0.1);
  --red: #ff3366;
  --red-light: rgba(255, 51, 102, 0.1);
  --radius: 12px;
  --mono: 'DM Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--paper);
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
    radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.05), transparent 25%);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
}

.page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

/* Header */
.header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--glass-border); margin-bottom: 40px; }
.dna-icon { font-size: 40px; margin-bottom: 16px; filter: drop-shadow(0 0 10px var(--accent)); }
.header h1 { font-family: var(--sans); font-size: 2.4rem; font-weight: 600; color: var(--accent); text-shadow: var(--neon-glow); margin-bottom: 8px; }
.header p { color: var(--ink2); font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; font-family: var(--mono); }

/* Section headings */
.section-label {
  font-family: var(--mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

/* Glassmorphism Cards */
.parent-card, .option-card, .square-wrapper, .prob-card, .summary-bar {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}

/* Parent input cards */
.parents-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
.parent-card { padding: 24px; }
.parent-card-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.parent-badge {
  display: inline-block;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--paper);
  font-family: var(--mono);
  font-weight: 600;
  text-align: center;
  line-height: 28px;
  box-shadow: var(--neon-glow);
}
.parent-badge.b { background: var(--red); box-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }

.trait-row { margin-bottom: 16px; }
.trait-row label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink2);
  margin-bottom: 8px;
}
.trait-hint { color: var(--accent); }

.allele-inputs { display: flex; align-items: center; gap: 8px; }
.allele-inputs input {
  width: 60px; height: 48px;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  font-family: var(--mono);
  font-size: 1.2rem;
  text-align: center;
  color: var(--ink);
  transition: all 0.2s;
}
.allele-inputs input:focus { outline: none; border-color: var(--accent); box-shadow: var(--neon-glow); }
.allele-sep { color: var(--ink3); font-size: 1.2rem; }

.gamete-preview {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--ink2);
  margin-top: 16px;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  border: 1px solid var(--surface2);
}
.gamete-preview strong { color: var(--accent); font-weight: 500; }

/* Dominance & display options */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
.option-card { padding: 24px; }
.option-card h3 {
  font-family: var(--mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 16px;
}

.trait-dom { margin-bottom: 16px; }
.trait-dom label {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--ink2);
  display: block;
  margin-bottom: 8px;
}
.radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-pill {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  background: rgba(0,0,0,0.2);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
  user-select: none;
}
.radio-pill input { display: none; }
.radio-pill:has(input:checked) {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
}
.radio-pill:hover { border-color: var(--accent); }

/* Calculate button */
.btn-calculate {
  display: block;
  width: 100%;
  padding: 18px;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 48px;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.1) inset;
}
.btn-calculate:hover { background: var(--accent); color: var(--paper); box-shadow: var(--neon-glow); }
.btn-calculate:active { transform: scale(0.98); }

/* Punnett Square Table */
.square-wrapper { overflow-x: auto; margin-bottom: 32px; padding: 24px; }
.punnett-table {
  border-collapse: collapse;
  font-family: var(--mono);
  width: 100%;
  min-width: 500px;
}
.punnett-table td, .punnett-table th {
  border: 1px solid var(--glass-border);
  padding: 0;
  width: 20%;
  height: 100px;
  text-align: center;
  vertical-align: middle;
}
.punnett-table .corner { border-color: transparent; }
.punnett-table .col-header, .punnett-table .row-header {
  background: rgba(0, 243, 255, 0.05);
  color: var(--accent);
  font-size: 1rem;
  font-weight: 500;
}
.cell-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 8px;
  gap: 6px;
}
.cell-genotype { font-size: 1.1rem; font-weight: 600; color: var(--ink); }
.cell-visual { font-size: 1.5rem; line-height: 1; }
.cell-sub { font-size: 0.75rem; color: var(--ink2); text-transform: capitalize; }
.punnett-table .result-cell { transition: background 0.2s; }
.punnett-table .result-cell:hover { background: var(--surface2); }

/* Probability cards */
.prob-section { margin-bottom: 40px; }
.prob-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.prob-card { padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 8px; }
.prob-visual { font-size: 2rem; margin-bottom: 8px; }
.prob-genotype { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--ink); }
.prob-pct { font-size: 2.2rem; font-weight: 600; color: var(--accent); line-height: 1; text-shadow: 0 0 10px rgba(0,243,255,0.3); }
.prob-ratio { font-family: var(--mono); font-size: 0.8rem; color: var(--ink3); }
.prob-pheno { font-size: 0.85rem; color: var(--ink2); text-transform: capitalize; }

/* Summary row */
.summary-bar {
  padding: 20px;
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--ink2);
  margin-top: 24px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  justify-content: center;
}
.summary-bar span strong { color: var(--accent); font-weight: 600; }

.results-section { animation: fadeIn 0.4s ease forwards; opacity: 0; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.error-msg {
  background: var(--red-light);
  border: 1px solid rgba(255, 51, 102, 0.3);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--red);
  margin-bottom: 24px;
  box-shadow: 0 0 15px rgba(255, 51, 102, 0.1);
}

@media(max-width: 600px) {
  .parents-grid, .options-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.8rem; }
  .page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="dna-icon">🧬</div>
    <h1>Punnett Square Calculator</h1>
    <p>Custom 2-Trait Genetic Inheritance Predictor</p>
  </header>

  <div id="error-container"></div>

  <div class="section-label">Parent Setup (From Chat Example)</div>
  <div class="parents-grid">
    <div class="parent-card">
      <div class="parent-card-title">
        <span class="parent-badge">1</span> Girl
      </div>
      <div class="trait-row">
        <label>Trait 1 (Hair) <span class="trait-hint">A=Curly / a=Straight</span></label>
        <div class="allele-inputs">
          <input type="text" id="p1t1a1" maxlength="1" value="A" oninput="syncPreview()">
          <span class="allele-sep">/</span>
          <input type="text" id="p1t1a2" maxlength="1" value="a" oninput="syncPreview()">
        </div>
      </div>
      <div class="trait-row">
        <label>Trait 2 (Eyes) <span class="trait-hint">B=Brown / b=Blue</span></label>
        <div class="allele-inputs">
          <input type="text" id="p1t2a1" maxlength="1" value="B" oninput="syncPreview()">
          <span class="allele-sep">/</span>
          <input type="text" id="p1t2a2" maxlength="1" value="b" oninput="syncPreview()">
        </div>
      </div>
      <div class="gamete-preview" id="p1-gametes">
        <strong>Gametes:</strong> —
      </div>
    </div>

    <div class="parent-card">
      <div class="parent-card-title">
        <span class="parent-badge b">2</span> Boy
      </div>
      <div class="trait-row">
        <label>Trait 1 (Hair) <span class="trait-hint">A=Curly / a=Straight</span></label>
        <div class="allele-inputs">
          <input type="text" id="p2t1a1" maxlength="1" value="a" oninput="syncPreview()">
          <span class="allele-sep">/</span>
          <input type="text" id="p2t1a2" maxlength="1" value="a" oninput="syncPreview()">
        </div>
      </div>
      <div class="trait-row">
        <label>Trait 2 (Eyes) <span class="trait-hint">B=Brown / b=Blue</span></label>
        <div class="allele-inputs">
          <input type="text" id="p2t2a1" maxlength="1" value="b" oninput="syncPreview()">
          <span class="allele-sep">/</span>
          <input type="text" id="p2t2a2" maxlength="1" value="b" oninput="syncPreview()">
        </div>
      </div>
      <div class="gamete-preview" id="p2-gametes">
        <strong>Gametes:</strong> —
      </div>
    </div>
  </div>

  <div class="options-grid">
    <div class="option-card" id="dom-card">
      <h3>Dominance Settings</h3>
      <div class="trait-dom">
        <label id="dom-trait1-label">Trait 1 — dominant allele:</label>
        <div class="radio-group" id="dom-trait1-group"></div>
      </div>
      <div class="trait-dom">
        <label id="dom-trait2-label">Trait 2 — dominant allele:</label>
        <div class="radio-group" id="dom-trait2-group"></div>
      </div>
    </div>

    <div class="option-card display-card">
      <h3>Visual Mode</h3>
      <div class="radio-group" style="flex-direction: column; gap: 12px; margin-top: 16px;">
        <label class="radio-pill">
          <input type="radio" name="display" value="genotype"> Letters Only (Genotype)
        </label>
        <label class="radio-pill">
          <input type="radio" name="display" value="phenotype"> Pictures Only (Phenotype)
        </label>
        <label class="radio-pill">
          <input type="radio" name="display" value="both" checked> Combined View (Both)
        </label>
      </div>
    </div>
  </div>

  <button class="btn-calculate" onclick="calculate()">Generate Genetic Grid</button>

  <div id="results" style="display:none" class="results-section">
    <div class="section-label">Punnett Square (Visual Map)</div>
    <div class="square-wrapper">
      <div id="table-container"></div>
    </div>

    <div class="section-label">Trait Probabilities</div>
    <div class="prob-section">
      <div class="prob-grid" id="prob-grid"></div>
      <div class="summary-bar" id="summary-bar"></div>
    </div>
  </div>

</div>

<script>
// ─── Visual Mapping Engine ────────────────────────────────────────────────
const traitVisuals = {
  'A': { emoji: '➰', text: 'Curly Hair' },
  'a': { emoji: '〰️', text: 'Straight Hair' },
  'B': { emoji: '🟤', text: 'Brown Eyes' },
  'b': { emoji: '🔵', text: 'Blue Eyes' }
};

function getVisuals(phenoString) {
  const parts = phenoString.split(' ');
  let visualStr = '';
  let textStr = [];
  
  parts.forEach(p => {
    const cleanKey = p.replace('_', '');
    if (traitVisuals[cleanKey]) {
      visualStr += traitVisuals[cleanKey].emoji;
      textStr.push(traitVisuals[cleanKey].text);
    } else {
      visualStr += '❓';
      textStr.push(p);
    }
  });
  return { icons: visualStr, description: textStr.join(' + ') };
}

// ─── Core Logic (Untouched) ────────────────────────────────────────────────
function v(id){return document.getElementById(id).value.trim()}

function sortPair(a,b){
  if(a.toLowerCase()===b.toLowerCase()) return a<b?1:-1;
  const la=a.toLowerCase(),lb=b.toLowerCase();
  if(la!==lb) return la<lb?-1:1;
  return a<b?1:-1;
}

function sortGenotype(t1a,t1b,t2a,t2b){
  const p1=[t1a,t1b].sort(sortPair);
  const p2=[t2a,t2b].sort(sortPair);
  return p1.join('')+p2.join('');
}

function getGametes(t1a1,t1a2,t2a1,t2a2){
  return[
    t1a1+t2a1, t1a1+t2a2, t1a2+t2a1, t1a2+t2a2
  ];
}

function combineGametes(g1,g2){
  return sortGenotype(g1[0],g2[0],g1[1],g2[1]);
}

function buildDomRadios(){
  const t1a1=v('p1t1a1')||'A', t1a2=v('p1t1a2')||'a';
  const t2a1=v('p1t2a1')||'B', t2a2=v('p1t2a2')||'b';
  const alleles1=[...new Set([t1a1,t1a2,v('p2t1a1')||'A',v('p2t1a2')||'a'])];
  const alleles2=[...new Set([t2a1,t2a2,v('p2t2a1')||'B',v('p2t2a2')||'b'])];

  document.getElementById('dom-trait1-label').textContent=`Trait 1 (${t1a1}/${t1a2}) — dominant allele:`;
  document.getElementById('dom-trait2-label').textContent=`Trait 2 (${t2a1}/${t2a2}) — dominant allele:`;

  function makeGroup(groupId,name,alleles){
    const g=document.getElementById(groupId);
    const cur=g.querySelector('input:checked')?.value||alleles[0]; 
    g.innerHTML=alleles.map(a=>`<label class="radio-pill"><input type="radio" name="${name}" value="${a}" ${cur===a?'checked':''}> ${a} dominant</label>`).join('');
  }
  makeGroup('dom-trait1-group','dom1',alleles1);
  makeGroup('dom-trait2-group','dom2',alleles2);
}

function syncPreview(){
  const p1g=getGametes(v('p1t1a1')||'A',v('p1t1a2')||'a',v('p1t2a1')||'B',v('p1t2a2')||'b');
  const p2g=getGametes(v('p2t1a1')||'a',v('p2t1a2')||'a',v('p2t2a1')||'b',v('p2t2a2')||'b');
  document.getElementById('p1-gametes').innerHTML=`<strong>Gametes:</strong> ${p1g.join(', ')}`;
  document.getElementById('p2-gametes').innerHTML=`<strong>Gametes:</strong> ${p2g.join(', ')}`;
  buildDomRadios();
}

function getPhenotype(genotype){
  const dom1=document.querySelector('input[name="dom1"]:checked')?.value||'A';
  const dom2=document.querySelector('input[name="dom2"]:checked')?.value||'B';
  const t1=genotype.slice(0,2);
  const t2=genotype.slice(2,4);
  const ph1=dom1!=='none'?(t1.includes(dom1)?dom1+'_':t1.charAt(0)):t1;
  const ph2=dom2!=='none'?(t2.includes(dom2)?dom2+'_':t2.charAt(0)):t2;
  return ph1+' '+ph2;
}

function showError(msg){ document.getElementById('error-container').innerHTML=`<div class="error-msg">⚠ ${msg}</div>`; }
function clearError(){ document.getElementById('error-container').innerHTML=''; }

function calculate(){
  clearError();
  const inputs = ['p1t1a1','p1t1a2','p1t2a1','p1t2a2','p2t1a1','p2t1a2','p2t2a1','p2t2a2'].map(id => v(id));
  
  if(inputs.some(x=>!x)){showError('All allele fields must be filled in.');return;}
  if(inputs.some(x=>!/^[a-zA-Z]$/.test(x))){showError('Each allele must be a single letter.');return;}

  const p1Gametes=getGametes(...inputs.slice(0,4));
  const p2Gametes=getGametes(...inputs.slice(4,8));

  const cells=[];
  for(const g1 of p1Gametes){
    const row=[];
    for(const g2 of p2Gametes){row.push(combineGametes(g1,g2))}
    cells.push(row);
  }

  renderTable(p1Gametes,p2Gametes,cells);
  renderProbabilities(cells.flat());

  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderTable(p1g,p2g,cells){
  const display=document.querySelector('input[name="display"]:checked').value;
  const con=document.getElementById('table-container');

  let html='<table class="punnett-table"><thead><tr><td class="corner"></td>';
  p2g.forEach(g=>{html+=`<th class="col-header">${g}</th>`});
  html+='</tr></thead><tbody>';

  cells.forEach((row,ri)=>{
    html+=`<tr><th class="row-header">${p1g[ri]}</th>`;
    row.forEach(geno=>{
      const pheno=getPhenotype(geno);
      const visuals=getVisuals(pheno);
      
      let inner='';
      if(display==='genotype'){
        inner=`<span class="cell-genotype">${geno}</span>`;
      }else if(display==='phenotype'){
        inner=`<div class="cell-visual">${visuals.icons}</div><span class="cell-sub">${visuals.description}</span>`;
      }else{
        inner=`<div class="cell-visual">${visuals.icons}</div><span class="cell-genotype">${geno}</span><span class="cell-sub">${visuals.description}</span>`;
      }
      html+=`<td class="result-cell"><div class="cell-inner">${inner}</div></td>`;
    });
    html+='</tr>';
  });

  html+='</tbody></table>';
  con.innerHTML=html;
}

function renderProbabilities(allOffspring){
  const display=document.querySelector('input[name="display"]:checked').value;
  const n=allOffspring.length; 
  const counts={};
  allOffspring.forEach(g=>{counts[g]=(counts[g]||0)+1});

  let groupKey=g=>g;
  if(display==='phenotype' || display==='both'){groupKey=g=>getPhenotype(g)}

  const grouped={};
  allOffspring.forEach(g=>{
    const key=groupKey(g);
    if(!grouped[key]){grouped[key]={count:0,genotypes:new Set()}}
    grouped[key].count++;
    grouped[key].genotypes.add(g);
  });

  const sorted=Object.entries(grouped).sort((a,b)=>b[1].count-a[1].count);

  let html='';
  sorted.forEach(([key,{count,genotypes}])=>{
    const pct=((count/n)*100).toFixed(1);
    const ratio=`${count}/16`;
    const visuals = getVisuals(key);
    
    let cardContent = '';
    if(display==='genotype'){
       cardContent = `<div class="prob-genotype">${key}</div>`;
    } else {
       cardContent = `<div class="prob-visual">${visuals.icons}</div>
                      <div class="prob-pheno">${visuals.description}</div>`;
       if(display==='both') cardContent += `<div class="prob-genotype" style="margin-top:8px;">${[...genotypes].join(', ')}</div>`;
    }

    html+=`<div class="prob-card">
      ${cardContent}
      <div style="margin-top:auto">
        <div class="prob-pct">${pct}%</div>
        <div class="prob-ratio">${ratio} offspring</div>
      </div>
    </div>`;
  });

  document.getElementById('prob-grid').innerHTML=html;

  const uniqueGeno=Object.keys(counts).length;
  const phenoCounts={};
  allOffspring.forEach(g=>{const p=getPhenotype(g);phenoCounts[p]=(phenoCounts[p]||0)+1});
  const uniquePheno=Object.keys(phenoCounts).length;
  
  document.getElementById('summary-bar').innerHTML=
    `<span>Total: <strong>16</strong></span>
     <span>Unique Genotypes: <strong>${uniqueGeno}</strong></span>
     <span>Unique Phenotypes: <strong>${uniquePheno}</strong></span>`;
}

syncPreview();
</script>
</body>
</html>
